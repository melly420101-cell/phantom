<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHANTOM_TERMINAL</title>
    <style>
        :root {
            --glow-red: #ff1a1a;
            --bg-black: #050000;
        }

        body {
            background-color: var(--bg-black);
            color: var(--glow-red);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .terminal-frame {
            border: 2px solid var(--glow-red);
            padding: 20px;
            box-shadow: 0 0 15px rgba(255, 26, 26, 0.2);
            display: flex;
            flex-direction: row; /* Desktop side-by-side */
            gap: 40px;
            max-width: 900px;
            width: 100%;
        }

        canvas {
            max-width: 400px;
            width: 100%;
            height: auto;
        }

        .stats-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .terminal-frame {
                flex-direction: column; /* Stacks everything vertically */
                align-items: center;
                padding: 10px;
            }
            
            canvas {
                max-width: 300px; /* Shrinks wheel for small screens */
            }

            .stats-panel {
                width: 100%;
                text-align: center;
            }
        }

        .bar-bg {
            background: #220000;
            height: 20px;
            width: 100%;
            margin: 10px 0;
            border: 1px solid var(--glow-red);
        }

        .bar-fill {
            height: 100%;
            background: var(--glow-red);
            box-shadow: 0 0 10px var(--glow-red);
        }
    </style>
</head>
<body>

    <div class="terminal-frame">
        <div id="wheel-area">
            <h2 id="char-name">: LOADING...</h2>
            <canvas id="radarChart"></canvas>
        </div>

        <div class="stats-panel">
            <h3>WEIRD_INDEX</h3>
            <div class="bar-bg"><div id="weird-bar" class="bar-fill" style="width: 0%"></div></div>
            
            <h3>GRIT_STAMINA</h3>
            <div class="bar-bg"><div id="grit-bar" class="bar-fill" style="width: 0%"></div></div>
            
            <h3>ROT_DECAY</h3>
            <div class="bar-bg"><div id="rot-bar" class="bar-fill" style="width: 0%"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Extract stats from the URL sent by the Discord Bot
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('char-name').innerText = ": " + (params.get('name') || "UNKNOWN_SUBJECT");
        
        const grit = params.get('grit') || 100;
        const weird = params.get('weird') || 0;
        const rot = params.get('rot') || 0;

        // Update the visual bars
        document.getElementById('grit-bar').style.width = grit + "%";
        document.getElementById('weird-bar').style.width = weird + "%";
        document.getElementById('rot-bar').style.width = rot + "%";

        // Initialize Radar Chart
        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['JOY', 'TRUST', 'FEAR', 'SURPRISE', 'SADNESS', 'DISGUST', 'ANGER', 'ANTICIPATION'],
                datasets: [{
                    data: [
                        params.get('joy') || 5, params.get('trust') || 5, 
                        params.get('fear') || 5, params.get('surp') || 5,
                        params.get('sad') || 5, params.get('disg') || 5,
                        params.get('rage') || 5, params.get('anti') || 5
                    ],
                    backgroundColor: 'rgba(255, 26, 26, 0.3)',
                    borderColor: '#ff1a1a',
                    borderWidth: 2,
                    // If Rot is high, make the lines dashed
                    borderDash: rot > 50 ? [5, 5] : []
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: '#440000' },
                        grid: { color: '#440000' },
                        pointLabels: { color: '#ff1a1a', font: { size: 10 } },
                        ticks: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 100
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
