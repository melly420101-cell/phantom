<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHANTOM_TERMINAL_V2</title>
    <style>
        :root {
            --glow-red: #ff1a1a;
            --dim-red: #440000;
            --bg-black: #000000;
        }

        body {
            background-color: var(--bg-black);
            color: var(--glow-red);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Prevents sideways scrolling on phone */
            overflow-x: hidden; 
        }

        .terminal-frame {
            border: 2px solid var(--glow-red);
            padding: 20px;
            /* Initial glow on the frame */
            box-shadow: 0 0 15px rgba(255, 26, 26, 0.2);
            display: flex;
            flex-direction: row; /* Desktop layout */
            gap: 40px;
            max-width: 900px;
            width: 100%;
        }

        canvas {
            max-width: 400px;
            width: 100%;
            height: auto;
        }

        .stats-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* --- DARK MILITARY BAR STYLES --- */
        h3 { margin: 15px 0 5px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }

        .bar-bg {
            background: #0a0000; /* Near pure black background */
            height: 20px;
            width: 100%;
            margin-bottom: 15px;
            border: 1px solid var(--dim-red); /* Dim red outline for empty slots */
            position: relative;
        }

        .bar-fill {
            height: 100%;
            background: var(--glow-red);
            /* THE GLOW EFFECT */
            box-shadow: 0 0 15px var(--glow-red), 0 0 5px #ffffff; 
            transition: width 0.3s ease-in-out;
        }

        /* --- MOBILE RESPONSIVE LAYOUT (Stacks elements vertically) --- */
        @media (max-width: 768px) {
            .terminal-frame {
                flex-direction: column; /* Moves stats below the wheel */
                align-items: center;
                padding: 10px;
            }
            canvas { max-width: 300px; } /* Shrinks wheel on phone */
            .stats-panel { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="terminal-frame">
        <div id="wheel-area">
            <h2 id="char-name">: LOADING...</h2>
            <canvas id="radarChart"></canvas>
        </div>

        <div class="stats-panel">
            <h3>WEIRD_INDEX</h3>
            <div class="bar-bg"><div id="weird-bar" class="bar-fill" style="width: 0%"></div></div>
            
            <h3>GRIT_STAMINA</h3>
            <div class="bar-bg"><div id="grit-bar" class="bar-fill" style="width: 100%"></div></div>
            
            <h3>ROT_DECAY</h3>
            <div class="bar-bg"><div id="rot-bar" class="bar-fill" style="width: 5%"></div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Use the JavaScript provided in the user prompt for logic
        const params = new URLSearchParams(window.location.search);
        
        document.getElementById('char-name').innerText = ": " + (params.get('name') || "UNKNOWN_SUBJECT");
        
        const grit = params.get('grit') || 100;
        const weird = params.get('weird') || 0;
        const rot = params.get('rot') || 0;

        document.getElementById('grit-bar').style.width = grit + "%";
        document.getElementById('weird-bar').style.width = weird + "%";
        document.getElementById('rot-bar').style.width = rot + "%";

        const emotionalData = [
            params.get('joy') || 10, params.get('trust') || 10,
            params.get('fear') || 10, params.get('surp') || 10,
            params.get('grief') || 10, params.get('disg') || 10,
            params.get('rage') || 10, params.get('anti') || 10
        ];

        const hasMeltdown = emotionalData.some(val => val >= 100);

        const ctx = document.getElementById('radarChart').getContext('2d');
        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['JOY', 'TRUST', 'FEAR', 'SURPRISE', 'SADNESS', 'DISGUST', 'ANGER', 'ANTICIPATION'],
                datasets: [{
                    data: emotionalData,
                    backgroundColor: hasMeltdown ? 'rgba(255, 255, 255, 0.5)' : 'rgba(255, 26, 26, 0.3)',
                    borderColor: hasMeltdown ? '#ffffff' : '#ff1a1a',
                    borderWidth: hasMeltdown ? 4 : 2,
                    borderDash: rot > 50 ? [5, 5] : [],
                    pointBackgroundColor: '#ff1a1a'
                }]
            },
            options: {
                scales: {
                    r: {
                        angleLines: { color: '#440000' },
                        grid: { color: '#440000' },
                        pointLabels: { 
                            color: hasMeltdown ? '#ffffff' : '#ff1a1a', 
                            font: { size: 10 } 
                        },
                        ticks: { display: false },
                        suggestedMin: 0,
                        suggestedMax: 100
                    }
                },
                plugins: { legend: { display: false } }
            }
        });
    </script>
</body>
</html>
