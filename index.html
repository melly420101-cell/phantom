<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHANTOM_TERMINAL_V5.2_CORRUPTION</title>
    <style>
        /* --- MILITARY TERMINAL THEME --- */
        :root {
            --crt-green: #14ff14;
            --glow-red: #ff1a1a;
            --mid-red: #8B0000;
            --dim-red: #440000;
            --bg-black: #050000;
            --text-gray: #aaaaaa;
            --screen-flicker: 0.15s infinite;
        }

        @font-face {
            font-family: 'VHS';
            src: url('https://fonts.cdnfonts.com/s/16060/VCR_OSD_MONO_1.001.woff') format('woff');
        }

        body {
            background-color: #111;
            color: var(--glow-red);
            font-family: 'VHS', 'Courier New', monospace;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            touch-action: pan-y;
            font-size: 16px;
        }

        .crt-monitor {
            background: #222;
            border: 10px solid #2a2a2a;
            border-radius: 20px;
            padding: 5px;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8) inset, 0 10px 20px rgba(0,0,0,0.5);
            display: flex;
            width: 95%;
            max-width: 900px;
            max-height: 95vh;
            transition: all 0.1s;
        }

        .screen {
            background-color: var(--bg-black);
            width: 100%;
            height: 100%;
            border-radius: 10px;
            position: relative;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 15px;
            animation: flicker var(--screen-flicker);
        }

        .screen::after {
            content: " ";
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .corrupted-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent 0px, transparent 1px, rgba(255,255,255,0.05) 2px);
            opacity: 0;
            pointer-events: none;
            z-index: 90;
        }

        .rot-critical .corrupted-overlay {
            opacity: 1;
            animation: noise 0.2s infinite;
        }

        .rot-critical .crt-monitor {
            animation: shake 0.5s infinite;
            border-color: #440000;
        }

        .rot-critical .bar-fill {
            filter: hue-rotate(320deg) brightness(1.5);
        }

        @keyframes noise {
            0% { transform: translate(0,0); }
            10% { transform: translate(-5px,-5px); }
            20% { transform: translate(5px,5px); }
            100% { transform: translate(0,0); }
        }

        @keyframes shake {
            0% { transform: translate(0,0); }
            25% { transform: translate(1px, -1px); }
            50% { transform: translate(-1px, 1px); }
            100% { transform: translate(0,0); }
        }

        @keyframes flicker {
            0% { opacity: 0.98; }
            100% { opacity: 1; }
        }

        .glitching {
            animation: glitch 0.3s ease-in-out;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 2px); filter: hue-rotate(90deg); }
            100% { transform: translate(0); }
        }

        .main-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            flex-grow: 1;
        }

        /* Top row: radar + stats (flex row on desktop) */
        .top-row {
            display: flex;
            flex-direction: row;
            gap: 20px;
            flex-wrap: wrap;
        }

        #wheel-area {
            flex: 1 1 250px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #radarChart {
            width: 100% !important;
            height: auto !important;
            max-width: 300px;
            filter: drop-shadow(0 0 10px var(--glow-red));
        }

        .stats-panel {
            flex: 1 1 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-group {
            margin-bottom: 10px;
        }

        h3 {
            margin: 5px 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        .bar-bg {
            background: #000;
            height: 16px;
            width: 100%;
            border: 2px solid var(--dim-red);
        }

        .bar-fill {
            height: 100%;
            background: var(--glow-red);
            box-shadow: 0 0 10px var(--glow-red);
            transition: width 0.2s ease;
        }

        .bond-selector {
            margin: 15px 0 10px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 0.8rem;
            z-index: 110;
        }

        .bond-selector select {
            background: black;
            color: var(--glow-red);
            border: 2px solid var(--mid-red);
            font-family: 'VHS', monospace;
            padding: 12px 8px;
            width: 80%;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-radius: 0;
            -webkit-appearance: none;
            appearance: none;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
            justify-content: center;
            z-index: 110;
        }

        .terminal-btn {
            background: transparent;
            border: 2px solid var(--glow-red);
            color: var(--glow-red);
            font-family: 'VHS', monospace;
            padding: 14px 18px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            flex: 1 1 auto;
            min-width: 140px;
            transition: 0.2s;
            border-radius: 0;
        }

        .terminal-btn:hover,
        .terminal-btn:active {
            background: var(--glow-red);
            color: black;
        }

        .terminal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: var(--text-gray);
            color: var(--text-gray);
        }

        .footer {
            margin-top: 20px;
            border-top: 2px solid var(--dim-red);
            padding-top: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--dim-red);
            text-transform: uppercase;
        }

        /* ========== MOBILE OPTIMIZATIONS ========== */
        @media (max-width: 600px) {
            .top-row {
                flex-direction: column;
                align-items: stretch;
            }
            #wheel-area {
                width: 100%;
                margin-bottom: 10px;
            }
            #radarChart {
                max-width: 100%;   /* allow chart to use full width */
                height: auto;
            }
            .stats-panel {
                width: 100%;
            }
            .stat-group {
                margin-bottom: 15px;
            }
            h3 {
                font-size: 1rem;   /* larger labels */
            }
            .bar-bg {
                height: 24px;       /* taller bars for easier viewing */
            }
            .bond-selector select {
                width: 100%;        /* full width dropdown */
                padding: 16px 10px;
                font-size: 1rem;
            }
            .button-group {
                flex-direction: column;  /* stack buttons vertically */
                gap: 10px;
                margin-top: 15px;
            }
            .terminal-btn {
                width: 100%;         /* full width buttons */
                min-width: unset;
                padding: 18px 12px;  /* even larger tap target */
                font-size: 1rem;
            }
            .footer {
                font-size: 0.8rem;
                flex-wrap: wrap;
                gap: 10px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

<div class="crt-monitor" id="monitor-frame">
    <div class="screen" id="screen-body">
        <div class="corrupted-overlay"></div>
        <h2 id="char-name">> INITIALIZING...</h2>

        <div class="main-container">
            <div class="top-row">
                <div id="wheel-area">
                    <canvas id="radarChart"></canvas>
                </div>

                <div class="stats-panel">
                    <div class="stat-group">
                        <h3>> WEIRD_INDEX</h3>
                        <div class="bar-bg"><div id="weird-bar" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-group">
                        <h3>> GRIT_STAMINA</h3>
                        <div class="bar-bg"><div id="grit-bar" class="bar-fill"></div></div>
                    </div>
                    <div class="stat-group">
                        <h3>> ROT_DECAY</h3>
                        <div class="bar-bg"><div id="rot-bar" class="bar-fill"></div></div>
                    </div>
                </div>
            </div>

            <div class="bond-selector" id="bondSelector" style="display: none;">
                <select id="bondSelect" onchange="loadBond()">
                    <option value="">-- SELECT BOND --</option>
                </select>
            </div>

            <div class="button-group">
                <button class="terminal-btn" onclick="syncToBot()" id="syncBtn">> SYNC TO BOT</button>
                <button class="terminal-btn" onclick="refreshData()" id="refreshBtn">> REFRESH</button>
                <button class="terminal-btn" onclick="copyShareLink()">> COPY LINK</button>
            </div>
        </div>

        <div class="footer">
            <div id="status-text">> STATUS: ONLINE</div>
            <div id="version-text">> v5.2_STABLE</div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    // ---------- CONFIG ----------
    const API_BASE = "https://phantom-bot-production-fef1.up.railway.app";
    const SYNC_SECRET = "mySuperSecret123";

    const params = new URLSearchParams(window.location.search);
    const userId = params.get('userId');
    const charName = params.get('charName') || params.get('name');
    const rot = parseInt(params.get('rot')) || 0;
    const isCorrupted = rot >= 80;

    function glitchText(text) {
        if (!isCorrupted) return text;
        return text.replace(/e/gi, "3").replace(/a/gi, "4").replace(/o/gi, "0").replace(/i/gi, "1").replace(/s/gi, "5");
    }

    if (isCorrupted) {
        document.body.classList.add('rot-critical');
        document.getElementById('status-text').innerText = "> STATUS: CORRUPTED";
        document.getElementById('version-text').innerText = "> v5.2_UNSTABLE";
    }

    const rawName = params.get('name') || "SUBJECT_NULL";
    document.getElementById('char-name').innerText = glitchText(`> SUBJECT: ${rawName.toUpperCase()}`);

    // Stats bars
    document.getElementById('grit-bar').style.width = (params.get('grit') || 100) + "%";
    document.getElementById('rot-bar').style.width = rot + "%";
    document.getElementById('weird-bar').style.width = (params.get('weird') || 0) + "%";

    // ---------- COLOR SATURATION BASED ON VALUE ----------
    function getLocalColor(value) {
        if (isCorrupted) return '#fff';
        // Dark red (low) to bright red (high)
        const intensity = value / 100;
        const r = Math.floor(139 + (255 - 139) * intensity);
        const g = Math.floor(0 + (26 - 0) * intensity);
        const b = Math.floor(0 + (26 - 0) * intensity);
        return `rgb(${r}, ${g}, ${b})`;
    }

    function getTargetColor(value) {
        if (isCorrupted) return '#fff';
        const intensity = value / 100;
        const r = Math.floor(0 + (20 - 0) * intensity);
        const g = Math.floor(139 + (255 - 139) * intensity);
        const b = Math.floor(0 + (20 - 0) * intensity);
        return `rgb(${r}, ${g}, ${b})`;
    }

    // ---------- RADAR DATA ----------
    function getEmoData(prefix) {
        return [
            parseInt(params.get(prefix + 'joy')) || 10,
            parseInt(params.get(prefix + 'trust')) || 10,
            parseInt(params.get(prefix + 'fear')) || 10,
            parseInt(params.get(prefix + 'surp')) || 10,
            parseInt(params.get(prefix + 'grief')) || 10,
            parseInt(params.get(prefix + 'disg')) || 10,
            parseInt(params.get(prefix + 'rage')) || 10,
            parseInt(params.get(prefix + 'anti')) || 10
        ];
    }

    let datasets = [{
        label: 'LOCAL',
        data: getEmoData(''),
        backgroundColor: isCorrupted ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 26, 26, 0.3)',
        borderColor: isCorrupted ? '#fff' : '#ff1a1a',
        pointBackgroundColor: function(context) {
            const value = context.dataset.data[context.dataIndex];
            return getLocalColor(value);
        },
        pointBorderColor: '#fff',
        pointRadius: 4,
        pointHoverRadius: 6,
        dragData: false
    }];

    const targetName = params.get('target_oc');
    if (targetName) {
        datasets.push({
            label: 'TARGET',
            data: getEmoData('t_'),
            backgroundColor: 'rgba(20, 255, 20, 0.2)',
            borderColor: '#14ff14',
            pointBackgroundColor: function(context) {
                const value = context.dataset.data[context.dataIndex];
                return getTargetColor(value);
            },
            pointBorderColor: '#fff',
            pointRadius: 4,
            pointHoverRadius: 6,
            dragData: false
        });
        document.getElementById('bondSelector').style.display = 'none';
    } else {
        document.getElementById('bondSelector').style.display = 'flex';
        fetchBonds();
    }

    const ctx = document.getElementById('radarChart').getContext('2d');
    const radarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['JOY', 'TRUST', 'FEAR', 'SURP', 'GRIEF', 'DISG', 'RAGE', 'ANTI'],
            datasets: datasets
        },
        options: {
            plugins: {
                legend: { display: false }
            },
            scales: {
                r: {
                    angleLines: { color: isCorrupted ? '#fff' : '#440000' },
                    grid: { color: isCorrupted ? '#fff' : '#440000' },
                    pointLabels: {
                        color: isCorrupted ? '#fff' : '#ff1a1a',
                        font: { family: 'VHS', size: 10 }
                    },
                    ticks: { display: false },
                    suggestedMin: 0,
                    suggestedMax: 100
                }
            },
            elements: {
                point: {
                    radius: 4,
                    hoverRadius: 6
                }
            }
        }
    });

    // ---------- BOND FETCHING ----------
    async function fetchBonds() {
        if (!userId || !charName) return;
        try {
            const url = `${API_BASE}/api/relationships?userId=${encodeURIComponent(userId)}&charName=${encodeURIComponent(charName)}&secret=${encodeURIComponent(SYNC_SECRET)}`;
            const response = await fetch(url);
            const bonds = await response.json();
            const select = document.getElementById('bondSelect');
            select.innerHTML = '<option value="">-- SELECT BOND --</option>';
            bonds.forEach(bond => {
                const option = document.createElement('option');
                option.value = bond.userId;
                option.textContent = bond.characterName.toUpperCase();
                option.dataset.joy = bond.emotions.joy;
                option.dataset.trust = bond.emotions.trust;
                option.dataset.fear = bond.emotions.fear;
                option.dataset.surp = bond.emotions.surp;
                option.dataset.grief = bond.emotions.grief;
                option.dataset.disg = bond.emotions.disg;
                option.dataset.rage = bond.emotions.rage;
                option.dataset.anti = bond.emotions.anti;
                select.appendChild(option);
            });
        } catch (e) {
            console.error('Failed to fetch bonds', e);
        }
    }

    function loadBond() {
        const select = document.getElementById('bondSelect');
        const option = select.selectedOptions[0];
        if (!option.value) {
            if (radarChart.data.datasets.length > 1) {
                radarChart.data.datasets.pop();
                radarChart.update();
            }
            return;
        }
        const targetData = [
            parseInt(option.dataset.joy) || 10,
            parseInt(option.dataset.trust) || 10,
            parseInt(option.dataset.fear) || 10,
            parseInt(option.dataset.surp) || 10,
            parseInt(option.dataset.grief) || 10,
            parseInt(option.dataset.disg) || 10,
            parseInt(option.dataset.rage) || 10,
            parseInt(option.dataset.anti) || 10
        ];
        if (radarChart.data.datasets.length > 1) {
            radarChart.data.datasets[1].data = targetData;
            radarChart.data.datasets[1].label = option.textContent;
        } else {
            radarChart.data.datasets.push({
                label: option.textContent,
                data: targetData,
                backgroundColor: 'rgba(20, 255, 20, 0.2)',
                borderColor: '#14ff14',
                pointBackgroundColor: function(context) {
                    const value = context.dataset.data[context.dataIndex];
                    return getTargetColor(value);
                },
                pointBorderColor: '#fff',
                pointRadius: 4,
                pointHoverRadius: 6,
                dragData: false
            });
        }
        radarChart.update();
    }

    // ---------- SYNC TO BOT ----------
    async function syncToBot() {
        const btn = document.getElementById('syncBtn');
        btn.disabled = true;
        btn.innerText = '> SYNCING...';

        const currentValues = radarChart.data.datasets[0].data;
        const emotions = {};
        const labels = ['joy','trust','fear','surp','grief','disg','rage','anti'];
        labels.forEach((l, i) => emotions[l] = currentValues[i]);

        const payload = {
            userId: userId,
            characterName: charName,
            emotions: emotions,
            secret: SYNC_SECRET
        };

        try {
            const response = await fetch(`${API_BASE}/api/sync`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const result = await response.json();
            if (result.success) {
                btn.innerText = '> SYNC COMPLETE';
            } else {
                btn.innerText = '> SYNC FAILED';
                console.error(result.error);
            }
        } catch (e) {
            btn.innerText = '> CONNECTION ERROR';
            console.error(e);
        } finally {
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = '> SYNC TO BOT';
            }, 2000);
        }
    }

    // ---------- REFRESH DATA FROM BOT ----------
    async function refreshData() {
        const btn = document.getElementById('refreshBtn');
        btn.disabled = true;
        btn.innerText = '> REFRESHING...';

        if (!userId || !charName) {
            alert('Missing user or character info');
            btn.disabled = false;
            btn.innerText = '> REFRESH';
            return;
        }

        try {
            const url = `${API_BASE}/api/character?userId=${encodeURIComponent(userId)}&charName=${encodeURIComponent(charName)}&secret=${encodeURIComponent(SYNC_SECRET)}`;
            const response = await fetch(url);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            const data = await response.json();

            // Update radar chart's first dataset (local)
            radarChart.data.datasets[0].data = [
                data.joy, data.trust, data.fear, data.surp,
                data.grief, data.disg, data.rage, data.anti
            ];
            radarChart.update();

            // Update stat bars
            document.getElementById('grit-bar').style.width = data.grit + "%";
            document.getElementById('rot-bar').style.width = data.rot + "%";
            document.getElementById('weird-bar').style.width = data.weird + "%";

            btn.innerText = '> REFRESHED';
        } catch (e) {
            console.error('Refresh failed:', e);
            btn.innerText = '> ERROR';
        } finally {
            setTimeout(() => {
                btn.disabled = false;
                btn.innerText = '> REFRESH';
            }, 1500);
        }
    }

    // ---------- COPY SHARE LINK ----------
    function copyShareLink() {
        const currentValues = radarChart.data.datasets[0].data;
        const labels = ['joy','trust','fear','surp','grief','disg','rage','anti'];
        labels.forEach((l, i) => params.set(l, currentValues[i]));

        if (radarChart.data.datasets.length > 1) {
            const targetData = radarChart.data.datasets[1].data;
            const targetLabel = radarChart.data.datasets[1].label;
            params.set('target_oc', targetLabel);
            labels.forEach((l, i) => params.set('t_' + l, targetData[i]));
            const select = document.getElementById('bondSelect');
            if (select.selectedOptions[0] && select.selectedOptions[0].value) {
                params.set('target_user', select.selectedOptions[0].value);
            }
        } else {
            params.delete('target_oc');
            params.delete('target_user');
            labels.forEach(l => params.delete('t_' + l));
        }

        const newURL = window.location.origin + window.location.pathname + '?' + params.toString();
        navigator.clipboard.writeText(newURL);
        const btn = event.target;
        btn.innerText = '> LINK COPIED';
        setTimeout(() => btn.innerText = '> COPY LINK', 1500);
    }
</script>
</body>
</html>
